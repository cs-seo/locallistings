[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Long-lived caching for static image assets served from Supabase / our CDN base.
# Pages themselves are revalidated via /api/revalidate (ISR).
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — minimal sane defaults.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# Function bundling: the Next.js plugin handles routing for /api/*.
[functions]
  node_bundler = "esbuild"

# Trailing-slash normalization is handled by Next.js via `trailingSlash: false`
# in next.config.mjs. A duplicate rule here caused a redirect loop, so the
# manual redirect block was removed.
